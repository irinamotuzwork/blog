<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Blog</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>My Blog</h1>
  </header>

  <div id="posts"></div>
  <h2>Create Post</h2>
  <input id="title" placeholder="Title">
  <textarea id="content" placeholder="Content"></textarea>
  <button onclick="createPost()">Post</button>

  
  <main>
    <section class="posts">

      <article class="post">
        <h2><a href="post.html">My First Post </a></h2>
        <p>This is a short description of the post.</p>
        <small>March 2026</small>
      </article>

      <article class="post">
        <h2><a href="post.html">Another Post</a></h2>
        <p>Another short description.</p>
        <small>March 2026</small>
      </article>

    </section>
  </main>

  <script src="script.js"></script>

</body>
</html>
