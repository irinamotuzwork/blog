<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post - Irina Motuz</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Nav Container -->
  <div id="nav" data-testid="nav-container"></div>

  <!-- Main Content -->
  <main data-testid="post-page">

    <!-- LANDING SECTION -->
    <section class="landing" data-testid="post-landing">
      <h1 data-testid="post-page-title">Post</h1>
    </section>

    <!-- POST SECTION -->
    <section class="post-section" data-testid="post-section">
      <div class="post-container" data-testid="post-container">

        <article 
          id="post-content" 
          class="post-full"
          data-testid="post-full"
        >
          <!-- Post content will be loaded dynamically -->
        </article>

        <a 
          href="blog.html" 
          class="back-link"
          data-testid="back-to-blog"
        >
          ← Back to Blog
        </a>

      </div>
    </section>

    <!-- FOOTER SECTION -->
    <footer class="footer" data-testid="footer">
      <div class="footer-container">
        <p>&copy; 2026 Irina Motuz. All rights reserved.</p>
      </div>
    </footer>

  </main>

  <!-- Scripts -->
  <script src="js/nav.js"></script>
  <script>
    document.getElementById('nav').innerHTML = renderNav();
  </script>

  <script src="js/api.js"></script>
  <script src="js/post.js"></script>

</body>
</html>
