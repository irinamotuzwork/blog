<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Post - Irina Motuz</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Nav Container -->
  <div id="nav" data-testid="nav-container"></div>

  <!-- Main Content -->
  <main data-testid="create-post-page">

    <!-- LANDING SECTION -->
    <section class="landing" data-testid="create-post-landing">
      <h1 data-testid="create-post-title">Create Post</h1>
    </section>

    <!-- CREATE POST SECTION -->
    <section class="create-section" data-testid="create-section">
      <div class="create-container" data-testid="create-container">

        <h2 data-testid="form-heading">Create New Post</h2>

        <form 
          id="post-form" 
          class="create-form"
          data-testid="post-form"
        >
          <div class="form-group" data-testid="title-group">
            <label for="title">Title</label>
            <input 
              type="text" 
              id="title" 
              placeholder="Enter post title" 
              required
              data-testid="post-title-input"
            />
          </div>

          <div class="form-group" data-testid="content-group">
            <label for="content">Content</label>
            <textarea 
              id="content" 
              placeholder="Write your post content here..." 
              required
              data-testid="post-content-input"
            ></textarea>
          </div>

          <button 
            type="submit" 
            class="submit-btn"
            data-testid="submit-post"
          >
            Save Post
          </button>
        </form>

        <!-- Optional: success / error message -->
        <div data-testid="form-message" style="display:none;"></div>

      </div>
    </section>

    <!-- FOOTER SECTION -->
    <footer class="footer" data-testid="footer">
      <div class="footer-container">
        <p>&copy; 2026 Irina Motuz. All rights reserved.</p>
      </div>
    </footer>

  </main>

  <!-- Scripts -->
  <script src="js/nav.js"></script>
  <script>
    document.getElementById('nav').innerHTML = renderNav();
  </script>

  <script src="js/api.js"></script>
  <script src="js/form.js"></script>

</body>
</html>
