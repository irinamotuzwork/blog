<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Post - Irina Motuz</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Nav Container -->
  <div id="nav"></div>

  <!-- Main Content -->
  <main>

    <!-- LANDING SECTION -->
    <section class="landing">
      <h1>Create Post</h1>
    </section>

    <!-- CREATE POST SECTION -->
    <section class="create-section">
      <div class="create-container">
        <h2>Create New Post</h2>
        <form id="post-form" class="create-form">
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="Enter post title" required />
          </div>
          <div class="form-group">
            <label for="content">Content</label>
            <textarea id="content" placeholder="Write your post content here..." required></textarea>
          </div>
          <button type="submit" class="submit-btn">Save Post</button>
        </form>
      </div>
    </section>

    <!-- FOOTER SECTION -->
    <footer class="footer">
      <div class="footer-container">
        <p>&copy; 2026 Irina Motuz. All rights reserved.</p>
      </div>
    </footer>

  </main>

  <!-- Scripts -->
  <script src="js/nav.js"></script>
  <script>
    // Render navigation after nav.js is loaded
    document.getElementById('nav').innerHTML = renderNav();
  </script>

  <script src="js/api.js"></script>
  <script src="js/form.js"></script>

</body>
</html>
